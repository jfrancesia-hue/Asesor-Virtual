services:
  - type: web
    name: miasesor-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PROVIDER
        value: anthropic
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL_OPENAI
        value: gpt-4o
      - key: AI_MODEL_ANTHROPIC
        value: claude-sonnet-4-6
      - key: REDIS_URL
        fromService:
          type: redis
          name: miasesor-redis
          property: connectionString
      # ── Mercado Pago (billing) ───────────────────────────────
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      # ── Resend (transactional email) ─────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: noreply@miasesor.com.ar
      - key: FRONTEND_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  - type: redis
    name: miasesor-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
