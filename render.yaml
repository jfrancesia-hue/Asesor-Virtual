services:
  - type: web
    name: tuasesor-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PROVIDER
        value: anthropic
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL_OPENAI
        value: gpt-4o
      - key: AI_MODEL_ANTHROPIC
        value: claude-sonnet-4-6
      - key: REDIS_URL
        fromService:
          type: redis
          name: tuasesor-redis
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: noreply@tuasesor.app
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_PRICE_START
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_CREDITS_10
        sync: false
      - key: STRIPE_PRICE_CREDITS_30
        sync: false
      - key: STRIPE_PRICE_CREDITS_100
        sync: false
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: tuasesor-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
    autoDeploy: true

  - type: redis
    name: tuasesor-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
